<!--
=========================================================
HOW TO ADD VIDEOS — read this once, takes 5 minutes total
=========================================================

For each greeting, find a 10-20 second YouTube clip of a native speaker
pronouncing the word with the gesture visible if possible.

RECOMMENDED CHANNELS (search YouTube directly):
- Mandarin: "Yoyo Chinese - Ni Hao" or "Mandarin Blueprint pronunciation"
- Thai:     "Learn Thai with Mod - sawasdee" or "PaiThaiFood - greetings"
- Japanese: "JapanesePod101 - konnichiwa" or "Speak Japanese Naturally"
- Hindi:    "Learn Hindi with Anil Mahato - namaste" or "Hindi Bhasha - pronunciation"
- Arabic:   "ArabicPod101 - as-salamu alaykum" or "Easy Arabic"

ALTERNATIVE - record your team's own clips (recommended by the assessment
rubric for visible team contribution):
- Each team member learns one greeting
- Records a 10-sec phone clip pronouncing it + doing the gesture
- Uploads to YouTube as Unlisted
- Pastes the video ID in below

ALSO acceptable, all free + embeddable:
- Wikimedia Commons audio: commons.wikimedia.org/wiki/Category:Greetings_(audio)
- Forvo.com (pronunciations) - they have embed widgets

ON COUNTRY (Warami / Yaama): do NOT add a video unless a Traditional
Custodian or Walanga Muru has approved one. A quiet, respectful card is
better than an unverified clip. Confirm the word + protocol first:
mq.edu.au/about/indigenous-strategy

EACH GREETING NOW HAS TWO VIDEO SLOTS:
- videoEmbed         -> a native speaker SAYING the word (pronunciation)
- gestureVideoEmbed  -> someone DOING the gesture (the bow / wai / namaste / hand-to-chest)

GESTURE VIDEO SOURCES (search YouTube):
- Mandarin: "Chinese business greeting etiquette" or "how to greet in Chinese culture"
- Thai:     "how to wai" or "Thai wai gesture explained"
- Japanese: "Japanese bow levels" or "how to bow properly in Japan"
- Hindi:    "how to do namaste correctly" or "namaste gesture meaning"
- Arabic:   "Arabic greeting etiquette" or "right hand to chest gesture"

BEST option for the rubric - record your own team demonstrating each gesture
(10-second phone clip, upload as Unlisted to YouTube, paste the ID below).

TO ADD A VIDEO:
1. Open the YouTube video
2. Copy the part of the URL after "watch?v=" - that's the video ID
   Example: https://www.youtube.com/watch?v=dQw4w9WgXcQ -> ID is "dQw4w9WgXcQ"
3. Paste it inside the quotes for videoEmbed (pronunciation) OR gestureVideoEmbed
   (gesture) in the GREETINGS array below
4. Save the file. Done.

INSTANT AUDIO (no setup needed):
- Every play button cascades automatically until something plays:
  device voice -> verified Wikimedia clip -> built-in offline clip -> "hear it on Forvo".
- So a tap is never silent, even on a phone/PC with no voice for that language
  (a missing OR listed-but-silent voice falls through to the next source on its own).
- You never configure any of this.

CITATION (the assessment requires APA citation for any external source):
- Note the channel name + video title + upload date in your reference list
- Example: Easy Languages. (2023, March 15). Easy Mandarin 1 - Ni hao [Video].
  YouTube. https://youtube.com/watch?v=...
- Wikimedia audio clips are credited in the readme.
=========================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Say It Right - a self-paced companion for practising cross-cultural greetings. Tap, listen, watch, try.">
<title>Say It Right - cross-cultural greetings</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23fdf3e7'/%3E%3Cpath d='M6 8h20a2.5 2.5 0 0 1 2.5 2.5v8A2.5 2.5 0 0 1 26 21H14l-5 4v-4H6a2.5 2.5 0 0 1-2.5-2.5v-8A2.5 2.5 0 0 1 6 8z' fill='%23d97842'/%3E%3Ccircle cx='11.5' cy='14.5' r='1.7' fill='%23fff'/%3E%3Ccircle cx='17' cy='14.5' r='1.7' fill='%23fff'/%3E%3Ccircle cx='22.5' cy='14.5' r='1.7' fill='%23fff'/%3E%3C/svg%3E">
<style>
/* =========================================================
   PALETTE & TOKENS  (warm orange / cream - matches the deck)
   ========================================================= */
:root{
  --accent:        #d97842;   /* deep warm orange - large display only */
  --accent-deep:   #a8521f;   /* darker orange - AA-safe for text/icons on cream */
  --accent-btn:    #a8521f;   /* button fill - white text = 5.4:1 (AA pass) */
  --cream:         #fdf3e7;   /* page background */
  --cream-card:    #fffaf2;   /* card surface */
  --cream-sink:    #f6e7d3;   /* recessed panels / tables */
  --charcoal:      #3a2b1f;   /* body text */
  --charcoal-soft: #6b574733; /* hairline borders */
  --ink-muted:     #6f5a48;   /* secondary text - AA-safe on cream */
  --mint:          #aed9c1;   /* secondary */
  --mint-deep:     #2f6b4f;   /* mint as readable text/icon */
  --gold:          #e8c780;   /* highlight */
  --gold-deep:     #8a6a1f;   /* gold as readable text */
  --shadow-sm: 0 2px 8px rgba(110,80,50,.10);
  --shadow-md: 0 8px 26px rgba(120,80,45,.14);
  --shadow-lg: 0 16px 44px rgba(120,80,45,.20);
  --radius:    20px;
  --radius-sm: 13px;
  --maxw: 1080px;
  --serif: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
  --sans:  system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

*,*::before,*::after{ box-sizing:border-box; }
[hidden]{ display:none !important; }   /* beats display rules on .btn / .quick-play */

html{ scroll-behavior:smooth; }
@media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } }

body{
  margin:0;
  font-family:var(--sans);
  color:var(--charcoal);
  background-color:var(--cream);
  /* soft layered warmth + faint grain for atmosphere, no image files */
  background-image:
    radial-gradient(1200px 600px at 12% -8%, #ffe9cf 0%, rgba(255,233,207,0) 55%),
    radial-gradient(1000px 520px at 96% 4%, #f7e2c5 0%, rgba(247,226,197,0) 50%),
    radial-gradient(900px 700px at 50% 108%, #f3e6cf 0%, rgba(243,230,207,0) 55%);
  background-attachment:fixed;
  line-height:1.6;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
}

/* faint paper grain overlay */
body::before{
  content:"";
  position:fixed; inset:0; z-index:-1; pointer-events:none;
  opacity:.35;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
}

img,svg{ max-width:100%; }

.wrap{ width:100%; max-width:var(--maxw); margin-inline:auto; padding-inline:20px; }

h1,h2,h3{ font-family:var(--serif); font-weight:700; line-height:1.12; letter-spacing:-.01em; }

a{ color:var(--accent-deep); }

/* skip link for keyboard users */
.skip{
  position:absolute; left:-999px; top:8px; z-index:50;
  background:var(--charcoal); color:#fff; padding:10px 16px; border-radius:10px;
  text-decoration:none; font-weight:600;
}
.skip:focus{ left:12px; }

/* visible focus everywhere */
:focus-visible{ outline:3px solid var(--accent-deep); outline-offset:3px; border-radius:6px; }

/* =========================================================
   BUTTONS
   ========================================================= */
.btn{
  font-family:var(--sans); font-size:1rem; font-weight:650;
  border:none; cursor:pointer; border-radius:999px;
  background:var(--accent-btn); color:#fff;
  padding:13px 22px; min-height:44px;
  display:inline-flex; align-items:center; gap:8px; justify-content:center;
  box-shadow:var(--shadow-sm);
  transition:transform .12s ease, box-shadow .18s ease, background-color .18s ease;
}
.btn:hover{ transform:translateY(-2px); box-shadow:var(--shadow-md); background:#8a4117; }
.btn:active{ transform:translateY(0) scale(.98); }
.btn.ghost{
  background:transparent; color:var(--accent-deep);
  border:1.5px solid var(--accent-deep); box-shadow:none;
}
.btn.ghost:hover{ background:#fff3e6; }
@media (prefers-reduced-motion: reduce){ .btn,.btn:hover,.btn:active{ transform:none; } }

/* small icon-label audio buttons */
.audio-row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:6px 0 4px; }
.abtn{
  font-family:var(--sans); font-size:.92rem; font-weight:600;
  display:inline-flex; align-items:center; gap:7px;
  min-height:44px; padding:9px 16px; border-radius:999px; cursor:pointer;
  background:var(--cream-sink); color:var(--charcoal);
  border:1.5px solid #e3c39b;
  transition:transform .12s ease, background-color .15s ease, border-color .15s ease;
}
.abtn:hover{ background:#f3dcc0; transform:translateY(-1px); }
.abtn:active{ transform:scale(.97); }
.abtn .em{ font-size:1.05rem; line-height:1; }
@media (prefers-reduced-motion: reduce){ .abtn:hover,.abtn:active{ transform:none; } }

.speaking{
  display:inline-flex; align-items:center; gap:7px;
  font-size:.85rem; font-weight:600; color:var(--mint-deep);
  opacity:0; transition:opacity .2s ease; min-height:24px;
}
.speaking.on{ opacity:1; }
.speaking .wave{ display:inline-flex; gap:3px; }
.speaking .wave i{
  width:3px; height:13px; background:var(--mint-deep); border-radius:2px;
  animation:wave .9s ease-in-out infinite;
}
.speaking .wave i:nth-child(2){ animation-delay:.15s; }
.speaking .wave i:nth-child(3){ animation-delay:.3s; }
.speaking .wave i:nth-child(4){ animation-delay:.45s; }
@keyframes wave{ 0%,100%{ transform:scaleY(.4);} 50%{ transform:scaleY(1);} }
@media (prefers-reduced-motion: reduce){ .speaking .wave i{ animation:none; } }

/* =========================================================
   HERO
   ========================================================= */
.hero{ text-align:center; padding:64px 0 36px; position:relative; }
.hero .kicker{
  display:inline-block; font-family:var(--sans); font-weight:700;
  letter-spacing:.16em; text-transform:uppercase; font-size:.72rem;
  color:#8f4117; background:#ffe6cd;
  padding:7px 15px; border-radius:999px; margin-bottom:18px;
}
.hero h1{
  font-size:clamp(3rem, 12vw, 6rem); margin:.05em 0 .12em; color:var(--accent-deep);
  text-shadow:0 2px 0 #fff6ea;
}
.hero .sub{
  font-family:var(--serif); font-style:italic;
  font-size:clamp(1.25rem,4.5vw,1.85rem); color:var(--charcoal); margin:0 0 14px;
}
.hero .lead{ font-size:1.06rem; color:var(--ink-muted); margin:0 auto 22px; max-width:30ch; }
.hero .team-chip{
  display:inline-block; font-size:.85rem; color:var(--charcoal);
  background:var(--cream-card); border:1px solid #ecd3b0;
  padding:8px 16px; border-radius:999px; box-shadow:var(--shadow-sm);
}
.hero .scroll-hint{ margin-top:26px; font-size:.85rem; color:var(--ink-muted); }
.hero .scroll-hint .arrow{ display:block; font-size:1.4rem; color:var(--accent-deep); animation:bob 1.8s ease-in-out infinite; }
@keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(6px);} }
@media (prefers-reduced-motion: reduce){ .hero .scroll-hint .arrow{ animation:none; } }

/* small illustrated greeting trio under hero */
.hero-illo{ margin:26px auto 0; display:flex; justify-content:center; gap:6px; max-width:340px; }
.hero-illo svg{ width:88px; height:88px; }
.hero-illo svg:nth-child(2){ transform:translateY(-10px) scale(1.08); }

/* =========================================================
   SECTION HEADINGS
   ========================================================= */
.section{ padding:40px 0; }
.section-head{ text-align:center; margin-bottom:26px; }
.section-head h2{ font-size:clamp(1.8rem,6vw,2.6rem); color:var(--accent-deep); margin:0 0 6px; }
.section-head p{ color:var(--ink-muted); margin:0; font-size:1.02rem; }

/* =========================================================
   GREETING CARDS
   ========================================================= */
.cards{ display:grid; grid-template-columns:1fr; gap:20px; }
@media (min-width:640px){ .cards{ grid-template-columns:repeat(2,1fr); } }
@media (min-width:980px){ .cards{ grid-template-columns:repeat(3,1fr); } }

.card{
  background:var(--cream-card);
  border:1px solid #ecd3b0;
  border-left:5px solid var(--accent);
  border-radius:var(--radius);
  box-shadow:var(--shadow-sm);
  overflow:hidden;
  transition:box-shadow .25s ease, transform .25s ease, border-color .25s ease;
  display:flex; flex-direction:column;
}
.card.open{
  box-shadow:var(--shadow-lg);
  border-left-color:var(--accent-deep);
}
/* expanded card spans full grid width so detail has room */
@media (min-width:640px){ .card.open{ grid-column:1 / -1; } }

.card.country{ border-left-color:var(--mint-deep); }
.card.country.open{ border-left-color:var(--mint-deep); }

/* collapsed header */
.card-top{ display:flex; align-items:stretch; gap:0; }
.card-toggle{
  flex:1; text-align:left; cursor:pointer;
  background:transparent; border:none; font-family:var(--sans); color:var(--charcoal);
  padding:18px 16px 18px 20px; display:flex; align-items:center; gap:14px; min-height:44px;
}
.card-toggle .flag{ font-size:2rem; line-height:1; }
.card-toggle .badge-country{
  font-size:.62rem; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
  color:var(--mint-deep); background:#dcefe2; padding:5px 9px; border-radius:8px; white-space:nowrap;
}
.card-toggle .ct-text{ display:flex; flex-direction:column; gap:1px; min-width:0; }
.card-toggle .lang{ font-size:.78rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--accent-deep); }
.card-toggle .script{ font-family:var(--serif); font-size:1.7rem; line-height:1.1; }
.card-toggle .roman{ font-size:.92rem; color:var(--ink-muted); }
.card-toggle .chev{ margin-left:auto; color:var(--accent-deep); transition:transform .25s ease; font-size:1.1rem; }
.card.open .card-toggle .chev{ transform:rotate(180deg); }

.quick-play{
  flex:0 0 auto; align-self:stretch; width:60px;
  border:none; border-left:1px solid #f0dcc0; cursor:pointer;
  background:#fff3e6; color:var(--accent-deep);
  font-size:1.5rem; display:flex; align-items:center; justify-content:center;
  transition:background-color .15s ease;
}
.quick-play:hover{ background:#ffe6cd; }
.quick-play[hidden]{ display:none; }

/* expanded detail */
.card-detail{ display:none; padding:4px 20px 24px; }
.card.open .card-detail{ display:block; animation:fadeIn .3s ease; }
@keyframes fadeIn{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none;} }
@media (prefers-reduced-motion: reduce){ .card.open .card-detail{ animation:none; } }

.detail-grid{ display:grid; grid-template-columns:1fr; gap:22px; }
@media (min-width:740px){ .detail-grid{ grid-template-columns:1.1fr 1fr; align-items:start; } }

.hero-script{ text-align:center; padding:10px 0 4px; }
.hero-script .big{
  font-family:var(--serif); font-size:clamp(2.6rem,10vw,4rem);
  letter-spacing:.04em; color:var(--charcoal); line-height:1.1;
}
.hero-script .phon{ font-size:1.2rem; color:var(--accent-deep); font-weight:700; margin-top:4px; }
.hero-script .mean{ color:var(--ink-muted); font-style:italic; font-family:var(--serif); }
.hero-script .reply{
  margin-top:10px; font-size:.92rem; color:var(--mint-deep);
  background:#e7f5ec; display:inline-block; padding:6px 12px; border-radius:10px;
}

/* time of day */
.tod{ width:100%; border-collapse:collapse; margin-top:6px; font-size:.95rem; }
.tod caption{ text-align:left; font-weight:700; color:var(--accent-deep); margin-bottom:6px; font-size:.82rem; letter-spacing:.05em; text-transform:uppercase; }
.tod th, .tod td{ text-align:left; padding:9px 10px; border-bottom:1px solid #f0dcc0; vertical-align:top; }
.tod tbody tr:last-child td{ border-bottom:none; }
.tod .when{ color:var(--ink-muted); white-space:nowrap; font-size:.85rem; }
.tod .nat{ font-family:var(--serif); font-size:1.05rem; }
.tod .rom{ color:var(--accent-deep); }

/* gesture block */
.gesture{ display:flex; gap:14px; align-items:flex-start; background:var(--cream-sink); border-radius:var(--radius-sm); padding:14px; }
.gesture .illo{ flex:0 0 96px; }
.gesture .illo svg{ width:96px; height:96px; }
.gesture h4{ margin:0 0 4px; font-family:var(--sans); font-size:.95rem; color:var(--accent-deep); }
.gesture p{ margin:0; font-size:.92rem; color:var(--charcoal); }

/* cultural note callout */
.note{
  margin-top:6px; background:#fff7ea; border:1px solid var(--gold);
  border-left:5px solid var(--gold-deep); border-radius:var(--radius-sm);
  padding:14px 16px; font-size:.94rem;
}
.note strong{ color:var(--gold-deep); display:block; margin-bottom:3px; font-size:.78rem; letter-spacing:.06em; text-transform:uppercase; }

/* video */
.video-wrap{ margin-top:4px; }
.video-frame{ position:relative; aspect-ratio:16/9; border-radius:var(--radius-sm); overflow:hidden; background:#000; box-shadow:var(--shadow-sm); }
.video-frame iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
.video-ph{
  aspect-ratio:16/9; border-radius:var(--radius-sm);
  border:2px dashed #d9b88a; background:#fbeed9;
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  color:var(--ink-muted); padding:16px; gap:6px;
}
.video-ph .play-ic{ font-size:2rem; color:var(--accent-deep); }
.video-ph .small{ font-size:.8rem; }
.video-ph code{ background:#fff; padding:1px 6px; border-radius:5px; font-size:.78rem; color:var(--accent-deep); }

.subhead{ font-family:var(--sans); font-weight:700; font-size:.82rem; letter-spacing:.06em; text-transform:uppercase; color:var(--accent-deep); margin:0 0 6px; }

.audio-fallback{ font-size:.9rem; color:var(--ink-muted); font-style:italic; }

/* country card special panel */
.country-panel{ padding:6px 0 0; }
.country-panel .ack{ background:#e7f5ec; border-radius:var(--radius-sm); padding:14px 16px; font-size:.94rem; color:var(--charcoal); }
.country-panel .ack strong{ color:var(--mint-deep); }
.country-panel .confirm{ font-size:.85rem; color:var(--ink-muted); margin-top:10px; font-style:italic; }

/* =========================================================
   TRY IT YOURSELF
   ========================================================= */
.tryit{
  background:linear-gradient(160deg,#fff3e3,#fbe6cd);
  border:1px solid #ecd3b0; border-radius:28px;
  padding:34px 22px; text-align:center; box-shadow:var(--shadow-md);
}
.tryit .phase{
  font-family:var(--serif); font-size:clamp(1.5rem,6vw,2.2rem);
  color:var(--accent-deep); min-height:1.3em; margin:6px 0 8px; font-weight:700;
}
.tryit .clock{
  font-family:var(--serif); font-weight:700; font-size:clamp(4rem,22vw,7rem);
  line-height:1; color:var(--charcoal); letter-spacing:.02em;
  font-variant-numeric:tabular-nums;
}
.tryit .clock.warn{ color:var(--accent-deep); }
.tryit .progress{ height:10px; border-radius:999px; background:#f0dcc0; overflow:hidden; max-width:420px; margin:18px auto 4px; }
.tryit .progress span{ display:block; height:100%; width:100%; background:linear-gradient(90deg,var(--accent),var(--gold-deep)); transition:width .9s linear; }
.tryit .controls{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:18px; }
.tryit .hint{ color:var(--ink-muted); margin:4px 0 0; }
.tryit .done-prompt{ margin-top:18px; opacity:0; transition:opacity .3s ease; }
.tryit .done-prompt.on{ opacity:1; }

/* visually hidden (for screen-reader live region) */
.sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }

/* =========================================================
   THE STAKES
   ========================================================= */
.stakes-grid{ display:grid; grid-template-columns:1fr; gap:18px; }
@media (min-width:760px){ .stakes-grid{ grid-template-columns:1fr 1fr; } }
.stake{
  background:var(--cream-card); border:1px solid #ecd3b0; border-radius:var(--radius);
  padding:24px; box-shadow:var(--shadow-sm); position:relative;
}
.stake .tag{
  display:inline-block; font-size:.7rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
  padding:5px 11px; border-radius:999px; margin-bottom:12px;
}
.stake.micro .tag{ background:#ffe1d0; color:var(--accent-deep); }
.stake.macro .tag{ background:#dcefe2; color:var(--mint-deep); }
.stake p{ margin:0; font-size:1.06rem; line-height:1.55; }
.stake cite{ display:block; margin-top:10px; font-size:.82rem; color:var(--ink-muted); font-style:normal; }
.stakes-tie{ text-align:center; font-family:var(--serif); font-style:italic; font-size:1.25rem; color:var(--charcoal); margin:24px auto 0; max-width:34ch; }

/* =========================================================
   FOOTER
   ========================================================= */
footer{ margin-top:30px; background:var(--charcoal); color:#f6e7d3; padding:44px 0 30px; }
footer .wrap{ text-align:center; }
footer .closer{ font-family:var(--serif); font-size:1.5rem; color:var(--gold); margin:0 0 16px; }
footer .credit-chip{
  display:inline-block; background:#4c3a2b; padding:9px 18px; border-radius:999px;
  font-size:.9rem; color:#f6e7d3; margin-bottom:18px;
}
footer .fb a{ color:var(--gold); font-weight:600; }
footer .refs{ font-size:.74rem; color:#bba98f; line-height:1.6; max-width:62ch; margin:22px auto 0; text-align:left; }
footer .refs h3{ font-family:var(--sans); font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:#d9c3a3; margin:0 0 6px; }
footer .refs a{ color:#e0c79f; word-break:break-word; }
footer .aoc{
  margin-top:24px; padding-top:18px; border-top:1px solid #5a4636;
  font-size:.86rem; color:#d9c3a3; font-style:italic; max-width:54ch; margin-inline:auto;
}

/* two video tiles (pronunciation + gesture) */
.video-pair{ display:grid; grid-template-columns:1fr; gap:14px; }
@media (min-width:600px){ .video-pair{ grid-template-columns:1fr 1fr; } }
.vid-tile .subhead{ display:flex; align-items:center; gap:6px; }
.vid-tile .subhead span{ font-size:1rem; }
.video-filelink{
  aspect-ratio:16/9; border-radius:var(--radius-sm); text-decoration:none;
  border:2px solid #d9b88a; background:#fbeed9; color:var(--charcoal);
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
  padding:16px; gap:6px; transition:background-color .15s ease, transform .12s ease;
}
.video-filelink:hover{ background:#f3dcc0; transform:translateY(-2px); }
.video-filelink .play-ic{ font-size:2rem; color:var(--accent-deep); }
.video-filelink strong{ font-size:.9rem; color:var(--accent-deep); }
.video-filelink .small{ font-size:.76rem; color:var(--ink-muted); }
@media (prefers-reduced-motion: reduce){ .video-filelink:hover{ transform:none; } }

/* per-row time-of-day play button */
.tod td.play-cell{ width:54px; text-align:right; padding:6px 2px 6px 6px; }
.tod-play{
  width:44px; height:44px; border-radius:50%; cursor:pointer;
  border:1.5px solid #e3c39b; background:var(--cream-card); color:var(--accent-deep);
  font-size:1.05rem; display:inline-flex; align-items:center; justify-content:center;
  -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; touch-action:manipulation;
  transition:background-color .15s ease, transform .12s ease;
}
.tod-play:hover{ background:#ffe6cd; }
.tod-play:active{ transform:scale(.9); }
@media (prefers-reduced-motion: reduce){ .tod-play:active{ transform:none; } }
.tod-hint{ font-size:.74rem; color:var(--ink-muted); font-style:italic; margin:4px 0 2px; }
.tod-hint .em{ font-style:normal; }

/* Forvo tier-3 link */
.forvo-link{ margin:8px 0 0; font-size:.85rem; }
.forvo-link a{ color:var(--accent-deep); font-weight:600; text-decoration:none; }
.forvo-link a:hover{ text-decoration:underline; }

/* On Country 50 Words line */
.country-panel .fifty{ font-size:.9rem; color:var(--charcoal); margin-top:10px; }
.country-panel .fifty a{ color:var(--mint-deep); font-weight:600; white-space:nowrap; }

/* scroll reveal */
.reveal{ opacity:0; transform:translateY(22px); transition:opacity .6s ease, transform .6s ease; }
.reveal.in{ opacity:1; transform:none; }
@media (prefers-reduced-motion: reduce){ .reveal{ opacity:1; transform:none; transition:none; } }
</style>

  // ===========================================================
  // AUDIO ENGINE  —  three tiers: Web Speech -> Wikimedia -> Forvo

  // ---- Tier 1: voices (loaded async; iOS returns [] on first call) ----
  let VOICES = [];
  function loadVoices(){ try{ VOICES = speechSynthesis.getVoices() || []; }catch(e){ VOICES = []; } }
  if(speechOK){
    loadVoices();
    const onVC = () => { loadVoices(); refreshAudioAvailability(); };
    if(typeof speechSynthesis.addEventListener === "function") speechSynthesis.addEventListener("voiceschanged", onVC);
    else speechSynthesis.onvoiceschanged = onVC;
  }
  function findVoice(lang){
    if(!lang || !VOICES.length) return null;
    const L = lang.toLowerCase();
    let v = VOICES.find(x => x.lang && x.lang.toLowerCase() === L);
    if(v) return v;
    const base = L.split("-")[0];                       // partial: zh-CN -> any zh-*
    return VOICES.find(x => x.lang && x.lang.toLowerCase().split("-")[0] === base) || null;
  }
  function hasVoice(lang){ return !!findVoice(lang); }

  // which tier a greeting will use right now
  function tierFor(g){
    if(!g.speechLang) return "none";                    // On Country
    if(hasVoice(g.speechLang)) return "voice";
    if(g.audioFallback) return "file";                  // Wikimedia clip
    if(typeof TTS_AUDIO !== "undefined" && TTS_AUDIO[g.nativeScript]) return "embedded";
    return "forvo";
  }
  function forvoUrl(word){ return "https://forvo.com/word/" + encodeURIComponent(word) + "/"; }
  function forvoSearchUrl(text){ return "https://forvo.com/search/" + encodeURIComponent(text) + "/"; }
  // single words go to the word page (direct player); phrases go to search (always resolves)
  function forvoFor(text){ return /\s/.test(text) ? forvoSearchUrl(text) : forvoUrl(text); }

  // ---- speaking indicator ("speaking…" pill) ----
  let activeInd = null;
  function setSpeaking(ind, on){
    if(on){
      if(activeInd && activeInd !== ind) activeInd.classList.remove("on");
      activeInd = ind || null;
      if(ind) ind.classList.add("on");
    } else {
      if(ind) ind.classList.remove("on");
      if(activeInd === ind) activeInd = null;
    }
  }

  function stopAll(){

    if(fbAudio){ try{ fbAudio.pause(); }catch(e){} fbAudio = null; }

  // ---- Tier 1 playback (device voice). onFail cascades to the next tier if the
  // voice errors OR is listed-but-silent (common for hi-IN and cloud voices). ----
  function speakNow(text, lang, rate, ind, loops, onFail){
    if(!speechOK){ if(onFail) onFail(); return false; }
    const v = findVoice(lang);
    let n = 0, started = false, done = false;
    const fail = () => {
      if(done || started) return;              // already heard something — don't double up
      done = true;
      try{ speechSynthesis.cancel(); }catch(e){}
      if(onFail) onFail();
    };
    const once = () => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang; if(v) u.voice = v; u.rate = rate; u.pitch = 1;
      u.onstart = () => { started = true; setSpeaking(ind, true); };
      u.onend   = () => { n++; if(loops && n < loops) setTimeout(once, 900); else setSpeaking(ind, false); };
      u.onerror = () => { setSpeaking(ind, false); fail(); };
      speechSynthesis.speak(u);
    };
    once();
    setTimeout(fail, 1300);                     // no sound after 1.3s → cascade to next tier
    return true;
  }

  // ---- <audio> playback (Wikimedia clip OR embedded base64). onFail cascades to
  // the next tier if the clip 404s, can't decode, or playback is rejected. ----
  function playUrl(url, rate, ind, loops, onFail){
    let a;
    try{ a = new Audio(url); }
    catch(e){ if(onFail) onFail(); return false; }

    fbAudio = a;
    let n = 0, started = false, done = false;
    const fail = () => {
      if(done || started) return;
      done = true; setSpeaking(ind, false);
      if(onFail) onFail();

    });
    a.addEventListener("error", fail);
    const p = a.play();
    if(p && p.catch) p.catch(fail);
    return true;

  // Tiers cascade on failure: device voice -> recorded clip -> embedded clip -> Forvo.
  // Each step only fires if the previous one failed to make sound, so a missing or
  // silent voice (e.g. some hi-IN voices) never leaves a button quietly dead.
  function playAudio(item){
    stopAll();
    const rate  = item.mode === "slow" ? 0.5 : (item.mode === "loop" ? 0.8 : 0.85);
    const loops = item.mode === "loop" ? 3 : 1;
    const tts   = item.text && TTS_AUDIO[item.text];   // embedded base64 clip, offline-safe

    const tryForvo = () => {
      if(item.allowForvo && item.text){ window.open(forvoFor(item.text), "sayItRightForvo"); return "forvo"; }
      setSpeaking(item.ind, false); return "none";
    };
    const tryEmbedded = () => {
      if(tts){ playUrl(tts, item.mode === "slow" ? 0.7 : 1, item.ind, loops, tryForvo); return "embedded"; }
      return tryForvo();
    };
    const tryUrl = () => {
      if(item.url){ playUrl(item.url, item.mode === "slow" ? 0.6 : 1, item.ind, loops, tryEmbedded); return "file"; }
      return tryEmbedded();
    };

    if(item.lang && hasVoice(item.lang)){
      speakNow(item.text, item.lang, rate, item.ind, loops, tryUrl); return "voice";
    }
    return tryUrl();
  }

  // ---- registries refreshed when voices load late ----
  const forvoEntries = [];   // { g, el }
  function refreshAudioAvailability(){
    forvoEntries.forEach(({g, el}) => { el.hidden = tierFor(g) !== "forvo"; });
  }

  // ---- press gestures: tap = play, long-press = slow, double-tap = loop ----
  let hintSeen = false;
  try{ hintSeen = sessionStorage.getItem("sir_press_hint") === "1"; }catch(e){}
  function dismissHint(){
    if(hintSeen) return;
    hintSeen = true;
    try{ sessionStorage.setItem("sir_press_hint","1"); }catch(e){}
    $$(".tod-hint").forEach(h => h.hidden = true);
  }
  function attachPressGestures(btn, handlers){
    let timer = null, suppressClick = false;
    btn.addEventListener("pointerdown", () => {
      suppressClick = false;
      timer = setTimeout(() => { suppressClick = true; dismissHint(); handlers.slow(); }, 500);
    });
    ["pointerup","pointerleave","pointercancel"].forEach(ev => btn.addEventListener(ev, () => clearTimeout(timer)));
    btn.addEventListener("contextmenu", e => e.preventDefault());
    btn.addEventListener("click", e => {
      if(suppressClick){ suppressClick = false; return; }   // came from a long-press
      if(e.detail >= 2){ dismissHint(); handlers.loop(); }   // double-tap / double-click
      else handlers.play();                                  // single tap / keyboard
    });
  }

  // ---------- render greeting cards ----------
  const cardsEl = $("#cards");
  GAME.greetings.forEach((g) => cardsEl.appendChild(buildCard(g)));

  function el(tag, cls, html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html!=null) e.innerHTML=html; return e; }

  function buildCard(g){
    const card = el("div", "card" + (g.isCountry ? " country" : ""));
    card.id = "card-" + g.id;
    const detailId = "detail-" + g.id;

    // ---- collapsed header ----
    const top = el("div", "card-top");
    const toggle = el("button", "card-toggle");
    toggle.type = "button";
    toggle.setAttribute("aria-expanded", "false");
    toggle.setAttribute("aria-controls", detailId);
    const flag = g.flag
      ? `<span class="flag" aria-hidden="true">${g.flag}</span>`
      : `<span class="badge-country">On<br>Country</span>`;
    toggle.innerHTML = `
      ${flag}
      <span class="ct-text">
        <span class="lang">${g.language}</span>
        <span class="script" lang="${scriptLang(g)}">${g.nativeScript}</span>
        <span class="roman">${g.phonetic} · ${g.meaning}</span>
      </span>
      <span class="chev" aria-hidden="true">&#9662;</span>`;
    top.appendChild(toggle);

    // quick play (hidden for country / no-speech)
    const quick = el("button", "quick-play");
    quick.type = "button";
    quick.innerHTML = "&#128266;";
    quick.setAttribute("aria-label", "Play " + g.language + " greeting");
    if(g.isCountry){ quick.hidden = true; }
    else { quick.addEventListener("click", (e)=>{ e.stopPropagation(); playAudio({ text:g.nativeScript, lang:g.speechLang, url:g.audioFallback, ind:null, mode:"play", allowForvo:true }); }); }
    top.appendChild(quick);

    card.appendChild(top);

    // ---- detail ----
    const detail = el("div", "card-detail");
    detail.id = detailId;
    detail.appendChild( g.isCountry ? countryDetail(g) : greetingDetail(g) );
    card.appendChild(detail);

    // toggle behaviour
    toggle.addEventListener("click", () => toggleCard(card, toggle, g));
    return card;
  }

  function toggleCard(card, toggle, g){
    const willOpen = !card.classList.contains("open");
    if(willOpen){
      // close others (accordion keeps focus simple on mobile)
      $$(".card.open").forEach(c => {
        c.classList.remove("open");
        const t = $(".card-toggle", c); if(t) t.setAttribute("aria-expanded","false");
      });
      card.classList.add("open");
      toggle.setAttribute("aria-expanded","true");
      mountVideos(card);
    } else {
      card.classList.remove("open");
      toggle.setAttribute("aria-expanded","false");
    }
  }

  function greetingDetail(g){
    const frag = document.createDocumentFragment();

    // big script
    const hs = el("div","hero-script");
    hs.innerHTML = `
      <div class="big" lang="${scriptLang(g)}">${g.nativeScript}</div>
      <div class="phon">${g.phonetic}</div>
      <div class="mean">${g.meaning}</div>
      ${ g.reply ? `<div class="reply"><strong>${g.reply.roman}</strong> — ${g.reply.english}</div>` : "" }`;
    frag.appendChild(hs);

    // one shared "speaking…" indicator for this card's audio
    const ind = el("span","speaking",`<span class="wave" aria-hidden="true"><i></i><i></i><i></i><i></i></span> speaking…`);

    // audio controls (main word)
    frag.appendChild(audioControls(g, ind));

    // two-column grid: left = the two videos + time-of-day ; right = gesture + note
    const grid = el("div","detail-grid");

    const left = el("div");
    const vpair = el("div","video-pair");
    vpair.innerHTML = `
      <div class="vid-tile">
        <p class="subhead"><span aria-hidden="true">🗣</span> Hear it</p>
        <div class="vid-slot" data-vid data-embed="${esc(g.videoEmbed)}" data-title="${esc(g.videoTitle)}" data-field="videoEmbed"></div>
      </div>
      <div class="vid-tile">
        <p class="subhead"><span aria-hidden="true">🙏</span> See the gesture</p>
        <div class="vid-slot" data-vid data-kind="gesture" data-embed="${esc(g.gestureVideoEmbed)}" data-title="${esc(g.gestureVideoTitle)}" data-field="gestureVideoEmbed"></div>
      </div>`;
    left.appendChild(vpair);
    left.appendChild(timeOfDay(g, ind));
    grid.appendChild(left);

    const right = el("div");
    right.appendChild(gestureBlock(g));
    right.appendChild(noteBlock(g.culturalNote));
    grid.appendChild(right);

    frag.appendChild(grid);
    return frag;
  }
  function esc(s){ return String(s == null ? "" : s).replace(/"/g, "&quot;"); }

  function countryDetail(g){
    const frag = document.createDocumentFragment();
    const hs = el("div","hero-script");
    hs.innerHTML = `
      <div class="big">${g.nativeScript}</div>
      <div class="phon">${g.phonetic}</div>
      <div class="mean">${g.meaning}</div>`;
    hs.appendChild( el("p","audio-fallback","🔈 No synthesised audio, no stock clip — this greeting should be heard from a person, not a machine.") );
    frag.appendChild(hs);

    const panel = el("div","country-panel");
    panel.innerHTML = `<div class="ack"><strong>On Country.</strong> ${g.acknowledgement}</div>
      <p class="confirm">${g.confirmNote}</p>
      ${ g.fiftyWords ? `<p class="fifty">${g.fiftyWords} <a href="${g.fiftyWordsUrl}" target="_blank" rel="noopener">50words.online ↗</a></p>` : "" }`;
    frag.appendChild(panel);

    // gesture + cultural note (no video tiles for On Country)
    const grid = el("div","detail-grid");
    grid.appendChild(gestureBlock(g));
    grid.appendChild(noteBlock(g.culturalNote));
    frag.appendChild(grid);
    return frag;
  }

  function audioControls(g, ind){
    const box = el("div");
    box.appendChild( el("p","subhead","Hear it") );

    const row = el("div","audio-row");
    const mk = (em,label,mode) => mkAudioBtn(em,label, ()=> playAudio({ text:g.nativeScript, lang:g.speechLang, url:g.audioFallback, ind, mode, allowForvo:true }));
    row.appendChild(mk("🔊","Play","play"));
    row.appendChild(mk("🐢","Slow","slow"));
    row.appendChild(mk("🔁","Loop","loop"));
    row.appendChild(ind);
    box.appendChild(row);

    // Tier 3: Forvo — only when neither a device voice nor a Wikimedia clip is available
    const forvo = el("p","forvo-link",`<a href="${forvoUrl(g.nativeScript)}" target="_blank" rel="noopener">🔗 hear it on Forvo</a>`);
    forvo.hidden = tierFor(g) !== "forvo";
    forvoEntries.push({ g, el: forvo });
    box.appendChild(forvo);

    return box;
  }
  function mkAudioBtn(em, label, fn){
    const b = el("button","abtn",`<span class="em" aria-hidden="true">${em}</span> ${label}`);
    b.type="button"; b.setAttribute("aria-label", label + " pronunciation");
    b.addEventListener("click", fn);
    return b;
  }

  function timeOfDay(g, ind){
    if(!g.timeOfDay || !g.timeOfDay.length) return el("div");
    const wrap = el("div");
    const t = el("table","tod");
    t.innerHTML = `<caption>Through the day</caption><tbody></tbody>`;
    const tb = $("tbody", t);
    g.timeOfDay.forEach(r => {
      const tr = el("tr");
      tr.innerHTML = `<td class="when">${r.english}</td>
        <td class="nat" lang="${scriptLang(g)}">${r.native}</td>
        <td class="rom">${r.roman}</td>
        <td class="play-cell"></td>`;
      const btn = el("button","tod-play",`<span aria-hidden="true">🔊</span>`);
      btn.type = "button";
      btn.setAttribute("aria-label", "Play: " + r.english + " (" + r.roman + ")");
      const item = mode => ({ text:r.native, lang:g.speechLang, url:(r.audioFallback||""), ind, mode, allowForvo:true });
      attachPressGestures(btn, {
        play: () => playAudio(item("play")),
        slow: () => playAudio(item("slow")),
        loop: () => playAudio(item("loop"))
      });
      $(".play-cell", tr).appendChild(btn);
      tb.appendChild(tr);
    });
    const hint = el("p","tod-hint",`<span class="em" aria-hidden="true">🔊</span> tap to play · hold for slow · double-tap to repeat`);
    if(hintSeen) hint.hidden = true;
    wrap.appendChild(t);
    wrap.appendChild(hint);
    return wrap;
  }

  function gestureBlock(g){
    const d = el("div","gesture");
    d.innerHTML = `<div class="illo">${illoFor(g.id)}</div>
      <div><h4>${g.gesture.name}</h4><p>${g.gesture.description}</p></div>`;
    return d;
  }
  function noteBlock(text){
    return el("div","note",`<strong>Cultural note</strong>${text}`);
  }

  const FILE_PROTO = location.protocol === "file:";   // YouTube blocks embeds on file://
  function mountVideos(card){
    $$(".vid-slot", card).forEach(slot => {
      if(slot.dataset.mounted) return;
      slot.dataset.mounted = "1";
      const id = (slot.dataset.embed || "").trim();
      const title = slot.dataset.title || "greeting video";
      const isGesture = slot.dataset.kind === "gesture";
      if(PLACEHOLDER.test(id)){
        slot.innerHTML = `<div class="video-ph">
          <span class="play-ic" aria-hidden="true">&#9654;</span>
          <strong>${isGesture ? "Gesture video coming soon" : "Video coming soon"}</strong>
          <span class="small">🎥 Your team adds this — paste a YouTube ID into <code>${slot.dataset.field || "videoEmbed"}</code> in say-it-right.html</span>
        </div>`;
      } else if(FILE_PROTO){
        // Opened as a local file — embeds won't play, so offer a real link instead
        slot.innerHTML = `<a class="video-filelink" href="https://www.youtube.com/watch?v=${encodeURIComponent(id)}" target="_blank" rel="noopener">
          <span class="play-ic" aria-hidden="true">&#9654;</span>
          <strong>Watch: ${esc(title)}</strong>
          <span class="small">Opens on YouTube. Inline players appear once the page is hosted online.</span>
        </a>`;
      } else {
        slot.innerHTML = `<div class="video-frame">
          <iframe src="https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}"
            title="${esc(title)}" loading="lazy"
            allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
        </div>`;
      }
    });
  }

  function scriptLang(g){ return g.speechLang ? g.speechLang.split("-")[0] : "en"; }

  // ---------- Stakes ----------
  const stakesEl = $("#stakes");
  GAME.stakes.forEach(s => {
    const d = el("div","stake "+s.kind);
    d.innerHTML = `<span class="tag">${s.tag}</span><p>${s.text}</p><cite>${s.cite}</cite>`;
    stakesEl.appendChild(d);
  });

  // ---------- Try It Yourself timer ----------
  const TOTAL = 60, SWITCH = 30;
  let remaining = TOTAL, ticking = null, audioCtx = null;
  const phaseEl = $("#phase"), clockEl = $("#clock"), barEl = $("#bar");
  const startBtn = $("#startBtn"), resetBtn = $("#resetBtn");
  const donePrompt = $("#donePrompt"), live = $("#liveRegion");

  function beep(freq, dur, vol){
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type="sine"; o.frequency.value=freq;
      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol||0.07, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+(dur||0.2));
      o.start(t); o.stop(t+(dur||0.2)+0.02);
    }catch(e){}
  }
  function chimeSwitch(){ beep(660,0.18,0.07); setTimeout(()=>beep(880,0.22,0.07),180); }
  function chimeEnd(){ beep(523,0.2,0.07); setTimeout(()=>beep(440,0.26,0.07),200); setTimeout(()=>beep(349,0.34,0.07),440); }

  function render(){
    clockEl.textContent = remaining;
    clockEl.classList.toggle("warn", remaining <= 10);
    barEl.style.width = (remaining/TOTAL*100) + "%";
  }
  function announce(msg){ live.textContent = ""; setTimeout(()=>{ live.textContent = msg; }, 30); }

  function startTimer(){
    if(ticking) return;
    remaining = TOTAL;
    donePrompt.classList.remove("on"); donePrompt.hidden = true;
    startBtn.hidden = true; resetBtn.hidden = false;
    phaseEl.textContent = "Partner A’s turn"; announce("Partner A’s turn. Begin.");
    render();
    ticking = setInterval(() => {
      remaining--;
      render();
      if(remaining === SWITCH){
        phaseEl.textContent = "Partner B’s turn"; chimeSwitch();
        announce("Switch now. Partner B’s turn.");
      } else if(remaining <= 0){
        clearInterval(ticking); ticking = null;
        phaseEl.textContent = "Time’s up — nicely done"; chimeEnd();
        announce("Time is up. Nicely done.");
        donePrompt.hidden = false;
        requestAnimationFrame(() => donePrompt.classList.add("on"));
        startBtn.hidden = false; startBtn.textContent = "Go again";
        resetBtn.hidden = true;
      }
    }, 1000);
  }
  function resetTimer(){
    if(ticking){ clearInterval(ticking); ticking = null; }
    remaining = TOTAL; render();
    phaseEl.textContent = "Ready when you are";
    startBtn.hidden = false; startBtn.textContent = "Start 60 seconds";
    resetBtn.hidden = true;
    donePrompt.classList.remove("on"); donePrompt.hidden = true;
    announce("Timer reset.");
  }
  startBtn.addEventListener("click", startTimer);
  resetBtn.addEventListener("click", resetTimer);
  render();

  // stop any speech when leaving the page (tidy on mobile)
  window.addEventListener("pagehide", ()=>{ stopAll(); });

  // set initial Forvo visibility (re-checked whenever voices load late)
  refreshAudioAvailability();

  // ---------- scroll reveal ----------
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if("IntersectionObserver" in window && !reduce){
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
    }, { threshold:0.12 });
    $$(".reveal").forEach(e => io.observe(e));
  } else {
    $$(".reveal").forEach(e => e.classList.add("in"));
  }
})();
</script>
</body>
</html>
